# docker compose for local development with hot reload for backend and frontend, and a Postgres database.
version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartplanner-backend
    # stop running container if execute cmd "docker compose stop"
    # otherwise restart even when container crashes
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      # mount the backend code into the container for hot reload, but exclude node_modules to avoid conflicts between host and container  
      - ./backend:/app
      - /app/node_modules
    networks:
      - smartplanner

  frontend:
    build:
      context: ./smartplanner-src
      dockerfile: Dockerfile
      args:
        # pass the env variable to the build stage
        # this replaces the const response = await fetch(`${import.meta.env.VITE_API_URL}/api/auth/login`) to const response = await fetch(`http://localhost:3000/api/auth/login`) in the js output of the built image
        # at runtime, nginx only serves the static frontend files, no env can be injected
        VITE_API_URL: http://localhost:3000
    container_name: smartplanner-frontend
    # stop running container if execute cmd "docker compose stop"
    # otherwise restart even when container crashes
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./smartplanner-src/.env
    depends_on:
      - backend
    networks:
      - smartplanner

networks:
  smartplanner:
    driver: bridge
